<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Digital Flow Templates</title>
    <meta name="description" content="Login to your Digital Flow Templates account." />
    <link rel="icon" href="https://i.ibb.co/BJgZ71n/Screenshot-2026-07-05-182624.png" type="image/png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Manrope:wght@600;700;800&display=swap" rel="stylesheet" />
    <script src="https://unpkg.com/feather-icons"></script>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body class="dark">
    <main class="auth-page">
      <div class="auth-card reveal in-view">
        <div class="auth-form">
          <a href="index.html" class="nav-brand" style="margin-bottom: 1.5rem">
            <img src="https://i.ibb.co/BJgZ71n/Screenshot-2026-07-05-182624.png" alt="Digital Flow logo" />
            <span>Digital Flow</span>
          </a>
          <h2 style="margin-top: 1.5rem; text-align: center;">Sign in to your account</h2>

          <form style="margin-top: 1.5rem;">
            <div class="field">
              <label for="username">Email</label>
              <input type="text" id="username" name="username" placeholder="you@example.com" />
            </div>
            <div class="field">
              <label for="password">Password</label>
              <input type="password" id="password" name="password" placeholder="••••••••" />
            </div>
            <div class="auth-options">
              <label><input type="checkbox" /> Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem">Login</button>
          </form>
          <p style="text-align: center; margin-top: 1.5rem; color: var(--muted)">
            Don't have an account? <a href="register.html" style="font-weight: 700; color: var(--text)">Sign up</a>
          </p>
        </div>
        <div class="auth-side">
          <div class="auth-side-content">
            <div class="logo-pill">
              <img src="https://i.ibb.co/BJgZ71n/Screenshot-2026-07-05-182624.png" alt="Digital Flow logo" />
              <strong>Digital Flow</strong>
            </div>
            <h3>Your central hub for digital productivity.</h3>
            <p>Access your library of premium templates anytime, anywhere.</p>
            <div class="mock-panel">"This is the best template marketplace I've ever used. The quality is unmatched."</div>
          </div>
        </div>
      </div>
    </main>

    <div class="toast" role="status" aria-live="polite"></div>
    <script src="script.js"></script>
  </body>
</html>
